<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title> Buraco Negro | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login.css" />
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <header class="cabecalho">
    <a href="index.html" class="logo">Buracos Negros</a>


    <nav class="menu">

      <div class="menu-extra">
          <a href="cadastro.html">PT</a>
          <a href="cadastro-en.html">EN</a>

          <a href="login.html" class="btn-login">Login</a>
          <a href="cadastro.html" class="btn-login">Cadastro</a>
        </div>
    </nav>
  </header>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
         
          
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Nível de estudo:</span>
            <select id="nivel_estudo_input">
              <option value="iniciante">Iniciante</option>
              <option value="intermediario">Intermediário</option>
              <option value="avancado">Avançado</option>
            </select>
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" oninput="validarSenha()" />
          </div>
          <div class="requisitos">
            <p id="req-tamanho">• Mínimo 8 caracteres</p>
            <p id="req-maiuscula">• Letra maiúscula</p>
            <p id="req-minuscula">• Letra minúscula</p>
            <p id="req-especial">• Caractere especial</p>
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2026</h4>
      <span class="version">v1.0.0</span>
    </div>
  </div>
</body>

</html>

<script>
  const reqTamanho = document.getElementById("req-tamanho");
  const reqMaiuscula = document.getElementById("req-maiuscula");
  const reqMinuscula = document.getElementById("req-minuscula");
  const reqEspecial = document.getElementById("req-especial");

  function validarSenha() {
    let senha = senha_input.value;

    let temTamanho = false;
    let temMaiuscula = false;
    let temMinuscula = false;
    let temEspecial = false;
    let especiais = "!@#$%&*";

    if (senha.length >= 8) {
      temTamanho = true;
    }

    if (senha != senha.toLowerCase()) {
      temMaiuscula = true;
    }

    if (senha != senha.toUpperCase()) {
      temMinuscula = true;
    }

    for (let i = 0; i < senha.length; i++) {
      let letra = senha[i];

      if (especiais.includes(letra)) {
        temEspecial = true;
      }
    }

    if (temTamanho == true) {
      reqTamanho.classList.add("valido");
    } else {
      reqTamanho.classList.remove("valido");
    }

    if (temMaiuscula == true) {
      reqMaiuscula.classList.add("valido");
    } else {
      reqMaiuscula.classList.remove("valido");
    }

    if (temMinuscula == true) {
      reqMinuscula.classList.add("valido");
    } else {
      reqMinuscula.classList.remove("valido");
    }

    if (temEspecial == true) {
      reqEspecial.classList.add("valido");
    } else {
      reqEspecial.classList.remove("valido");
    }

    return temTamanho && temMaiuscula && temMinuscula && temEspecial;
  }

  function cadastrar() {
    let nomeVar = nome_input.value;
    let emailVar = email_input.value;
    let nivelEstudoVar = nivel_estudo_input.value;
    let senhaVar = senha_input.value.trim();
    let confirmacaoSenhaVar = confirmacao_senha_input.value.trim();

    let temArroba = false;
    let temPonto = false;

    for (let i = 0; i < emailVar.length; i++) {
      if (emailVar[i] == "@") {
        temArroba = true;
      }

      if (emailVar[i] == ".") {
        temPonto = true;
      }
    }

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos.";
      finalizarAguardar();
      return false;
    }

    if (!temArroba || !temPonto || !emailVar.includes(".")) {
      alert("Email invalido");
      return false;
    }

    if (validarSenha() == false) {
      alert("Senha precisa ter no minimo 8 caracteres, letra maiuscula, letra minuscula e caractere especial.");
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
      alert("As senhas nao coincidem");
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        nivelEstudoServer: nivelEstudoVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);

          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
