<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title> Buraco Negro | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="../public/css/style.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="listar()">
  <!--header inicio-->
 <header class="cabecalho">
  <div class="logo">Buracos Negros</div>

  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="index.html#abismo">O Abismo</a>
    <a href="index.html#retorno">Horizonte</a>

    <div class="menu-extra">
      <button onclick="trocarIdioma('pt')">PT</button>
      <button onclick="trocarIdioma('en')">EN</button>

      <a href="login.html" class="btn-login">Login</a>
      <a href="cadastro.html" class="btn-login">Cadastro</a>
    </div>
  </nav>
</header>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Código de ativação:</span>
            <input id="codigo_input" type="text" placeholder="Insira aqui seu código" />
          </div>
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
         <div class="requisitos">
  <p id="req-tamanho">• Mínimo 8 caracteres</p>
  <p id="req-maiuscula">• Letra maiúscula</p>
  <p id="req-minuscula">• Letra minúscula</p>
  <p id="req-especial">• Caractere especial</p>
</div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2023</h4>
      <span class="version">v1.0.0</span>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>

<script>
const reqTamanho = document.getElementById("req-tamanho");
const reqMaiuscula = document.getElementById("req-maiuscula");
const reqMinuscula = document.getElementById("req-minuscula");
const reqEspecial = document.getElementById("req-especial");

senha_input.addEventListener("input", function () {
  let senha = senha_input.value;

  let temMaiuscula = false;
  let temMinuscula = false;
  let temEspecial = false;

  for (let i = 0; i < senha.length; i++) {
    let letra = senha[i];

    if (letra >= "A" && letra <= "Z") {
      temMaiuscula = true;
    }

    if (letra >= "a" && letra <= "z") {
      temMinuscula = true;
    }

    if (
      !(letra >= "A" && letra <= "Z") &&
      !(letra >= "a" && letra <= "z") &&
      !(letra >= "0" && letra <= "9")
    ) {
      temEspecial = true;
    }
  }

  reqTamanho.classList.toggle("valido", senha.length >= 8);
  reqMaiuscula.classList.toggle("valido", temMaiuscula);
  reqMinuscula.classList.toggle("valido", temMinuscula);
  reqEspecial.classList.toggle("valido", temEspecial);
});

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    senha_input.addEventListener("input", function(){

    let senha = senha_input.value

    let temMaiuscula = false
    let temMinuscula = false
    let temEspecial = false

    for(let i = 0; i < senha.length; i++){

        let letra = senha[i]

        if(letra >= 'A' && letra <= 'Z'){
            temMaiuscula = true
        }

        if(letra >= 'a' && letra <= 'z'){
            temMinuscula = true
        }

        if(!(letra >= 'A' && letra <= 'Z') &&
           !(letra >= 'a' && letra <= 'z') &&
           !(letra >= '0' && letra <= '9')){
            temEspecial = true
        }
    }

    
    if(senha.length >= 8){
        req_tamanho.classList.add("valido")
    } else {
        req_tamanho.classList.remove("valido")
    }

    
    if(temMaiuscula){
        req_maiuscula.classList.add("valido")
    } else {
        req_maiuscula.classList.remove("valido")
    }

   
    if(temMinuscula){
        req_minuscula.classList.add("valido")
    } else {
        req_minuscula.classList.remove("valido")
    }

  
    if(temEspecial){
        req_especial.classList.add("valido")
    } else {
        req_especial.classList.remove("valido")
    }

})

let email = email_input.value

let temArroba = false
let temPonto = false

for(let i = 0; i < email.length; i++){

    if(email[i] == '@'){
        temArroba = true
    }

    if(email[i] == '.'){
        temPonto = true
    }
}

if(!temArroba || !temPonto || !email.endsWith('.com')){
    alert("Email inválido")
    return
}

// validações
if(senha.length < 8){
    alert("Senha precisa ter no mínimo 8 caracteres")
    return
}

if(!temMaiuscula){
    alert("Senha precisa ter letra maiúscula")
    return
}

if(!temMinuscula){
    alert("Senha precisa ter letra minúscula")
    return
}

if(!temEspecial){
    alert("Senha precisa ter caractere especial")
    return
}
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
