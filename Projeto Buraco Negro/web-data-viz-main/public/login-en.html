<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Black Hole | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body onload="mostrarDicaLogin()">

    <header class="cabecalho">
        <a href="index-en.html" class="logo">Black Holes</a>

        <nav class="menu">
            <div class="menu-extra">
                <a href="login.html">PT</a>
                <a href="login-en.html">EN</a>

                <a href="login-en.html" class="btn-login">Login</a>
                <a href="cadastro-en.html" class="btn-login">Register</a>
            </div>
        </nav>
    </header>

    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container login-container">
            <div class="card card-login">
                <h2>Welcome back!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Password:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Enter</button>
                </div>
                <div class="link-cadastro">
                    <span>Do not have an account?</span>
                    <a href="cadastro-en.html">Click here!</a>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>

            <div class="caixa-dica-login">
                <h3>Space tip</h3>
                <p id="dica_login"></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <h4>Made with care by a student &hearts; SPTech &copy; 2026</h4>
            <span class="version">v1.0.0</span>
        </div>
    </div>

</body>

</html>

<script>
    function entrar() {
        aguardar();
        mostrarDicaLogin();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Fill in all fields.";
            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!");

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/dashNova-en.html";
                    }, 1000);
                });

            } else {
                console.log("There was an error while trying to log in!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }

    function mostrarDicaLogin() {
        let numero = Math.random();

        if (numero < 0.33) {
            dica_login.innerHTML = "Tip: not even light can escape from a black hole.";
        } else if (numero < 0.66) {
            dica_login.innerHTML = "Tip: the event horizon is known as the point of no return.";
        } else {
            dica_login.innerHTML = "Tip: black holes can be born after the collapse of massive stars.";
        }
    }
</script>
