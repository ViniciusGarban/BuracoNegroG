<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Black Hole | Registration</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login.css" />
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <header class="cabecalho">
    <a href="index-en.html" class="logo">Black Holes</a>

    <nav class="menu">
      <div class="menu-extra">
        <a href="cadastro.html">PT</a>
        <a href="cadastro-en.html">EN</a>

        <a href="login-en.html" class="btn-login">Login</a>
        <a href="cadastro-en.html" class="btn-login">Register</a>
      </div>
    </nav>
  </header>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Welcome!</h2>
        <div class="formulario">
          <div class="campo">
            <span>Name:</span>
            <input id="nome_input" type="text" placeholder="Your name" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="myemail@provider.com" />
          </div>
          <div class="campo">
            <span>Password:</span>
            <input id="senha_input" type="password" placeholder="******" oninput="validarSenha()" />
          </div>
          <div class="requisitos">
            <p id="req-tamanho">• Minimum 8 characters</p>
            <p id="req-maiuscula">• Uppercase letter</p>
            <p id="req-minuscula">• Lowercase letter</p>
            <p id="req-especial">• Special character</p>
          </div>
          <div class="campo">
            <span>Password confirmation:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Register</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <h4>Made with care by a student &hearts; SPTech &copy; 2026</h4>
      <span class="version">v1.0.0</span>
    </div>
  </div>
</body>

</html>

<script>
  const reqTamanho = document.getElementById("req-tamanho");
  const reqMaiuscula = document.getElementById("req-maiuscula");
  const reqMinuscula = document.getElementById("req-minuscula");
  const reqEspecial = document.getElementById("req-especial");

  function validarSenha() {
    let senha = senha_input.value;

    let temTamanho = false;
    let temMaiuscula = false;
    let temMinuscula = false;
    let temEspecial = false;
    let especiais = "!@#$%&*";

    if (senha.length >= 8) {
      temTamanho = true;
    }

    if (senha != senha.toLowerCase()) {
      temMaiuscula = true;
    }

    if (senha != senha.toUpperCase()) {
      temMinuscula = true;
    }

    for (let i = 0; i < senha.length; i++) {
      let letra = senha[i];

      if (especiais.includes(letra)) {
        temEspecial = true;
      }
    }

    if (temTamanho == true) {
      reqTamanho.classList.add("valido");
    } else {
      reqTamanho.classList.remove("valido");
    }

    if (temMaiuscula == true) {
      reqMaiuscula.classList.add("valido");
    } else {
      reqMaiuscula.classList.remove("valido");
    }

    if (temMinuscula == true) {
      reqMinuscula.classList.add("valido");
    } else {
      reqMinuscula.classList.remove("valido");
    }

    if (temEspecial == true) {
      reqEspecial.classList.add("valido");
    } else {
      reqEspecial.classList.remove("valido");
    }

    return temTamanho && temMaiuscula && temMinuscula && temEspecial;
  }

  function cadastrar() {
    let nomeVar = nome_input.value;
    let emailVar = email_input.value;
    let senhaVar = senha_input.value.trim();
    let confirmacaoSenhaVar = confirmacao_senha_input.value.trim();

    let temArroba = false;
    let temPonto = false;

    for (let i = 0; i < emailVar.length; i++) {
      if (emailVar[i] == "@") {
        temArroba = true;
      }

      if (emailVar[i] == ".") {
        temPonto = true;
      }
    }

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Fill in all fields.";
      finalizarAguardar();
      return false;
    }

    if (!temArroba || !temPonto || !emailVar.endsWith(".com")) {
      alert("Invalid email");
      return false;
    }

    if (validarSenha() == false) {
      alert("Password must have at least 8 characters, an uppercase letter, a lowercase letter and a special character.");
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
      alert("Passwords do not match");
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Registration completed successfully! Redirecting to the login screen...";

          setTimeout(() => {
            window.location = "login-en.html";
          }, 2000);

          finalizarAguardar();
        } else {
          throw "There was an error while trying to register!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
